<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Cocktail" />
  <title>Cocktail · 调酒</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍸</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand" id="brand">
        <span class="brand-mark">🍸</span>
        <span class="brand-name" data-i18n="appTitle">Cocktail</span>
      </div>

      <nav class="seg" role="tablist" aria-label="View switcher">
        <button class="seg-btn active" data-view="recipes" data-i18n="recipes" role="tab">Recipes</button>
        <button class="seg-btn" data-view="bartender" data-i18n="bartender" role="tab">Bartender</button>
        <span class="seg-thumb" aria-hidden="true"></span>
      </nav>

      <button class="lang-toggle" id="langToggle" title="Switch language / 切换语言">
        <span id="langLabel">中文</span>
      </button>

      <button class="icon-btn" id="settingsBtn" title="设置 / Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M19.14 12.94a7.5 7.5 0 0 0 .05-.94 7.5 7.5 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.5 7.5 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .61.22l2.39-.96c.49.38 1.04.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="app">
    <!-- ===================== RECIPES VIEW ===================== -->
    <section id="view-recipes" class="view active">
      <div class="page-head">
        <h1 data-i18n="recipesTitle">Recipes</h1>
        <p class="page-sub" data-i18n="recipesSub">Classics, signatures &amp; mocktails — tap any card for the full method.</p>
      </div>

      <div class="chips" id="filterChips">
        <button class="chip active" data-filter="all" data-i18n="all">All</button>
        <button class="chip" data-filter="classic" data-i18n="classic">Classic</button>
        <button class="chip" data-filter="signature" data-i18n="signature">Signature</button>
        <button class="chip" data-filter="mocktail" data-i18n="mocktail">Mocktail</button>
      </div>

      <div class="chips availability-chips" id="availabilityChips" aria-label="Availability filter">
        <button class="chip active" data-availability="all" data-i18n="availabilityAll">All stock states</button>
        <button class="chip" data-availability="available" data-i18n="availableNow">Available now</button>
        <button class="chip" data-availability="substitutable" data-i18n="substitutableNow">With substitute</button>
        <button class="chip" data-availability="missing" data-i18n="missingKey">Missing key</button>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"/>
        </svg>
        <input id="searchInput" type="search" class="search" data-i18n-ph="searchPh" placeholder="Search by name, base, flavor…" autocomplete="off" />
      </div>

      <div class="grid" id="recipeGrid"></div>
      <div class="empty" id="recipeEmpty" hidden></div>
    </section>

    <!-- ===================== BARTENDER VIEW ===================== -->
    <section id="view-bartender" class="view">
      <div class="chat-shell">
        <div class="chat-scroll" id="chatScroll">
          <div class="chat-messages" id="chatMessages"></div>
        </div>

        <div class="chat-foot">
          <div class="quick" id="quickPrompts"></div>
          <div class="composer">
            <textarea id="chatInput" rows="1" data-i18n-ph="composerPh" placeholder="和调酒师聊聊你的故事、心情，或问个调酒问题…"></textarea>
            <button id="sendBtn" class="send-btn" aria-label="Send">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3.4 20.4 21 12 3.4 3.6 3.39 10.12 17 12 3.39 13.88z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ===================== SETTINGS MODAL ===================== -->
  <div class="settings-overlay" id="settingsOverlay" hidden>
    <div class="settings-panel" role="dialog" aria-modal="true">
      <div class="settings-head">
        <h2 data-i18n="settings">Settings</h2>
        <button class="sheet-close" id="settingsClose" aria-label="Close">✕</button>
      </div>

      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">
            <span>LLM 接口 / LLM Endpoint</span>
          </div>
          <p class="settings-hint" data-i18n="llmHint">
            OpenAI-compatible. Changes save to .env and take effect immediately. The key is stored locally only.
          </p>

          <label class="field">
            <span data-i18n="baseUrl">Base URL</span>
            <input id="cfgBaseUrl" type="text" placeholder="https://api.openai.com/v1" autocomplete="off" />
          </label>

          <label class="field">
            <span data-i18n="apiKey">API Key</span>
            <input id="cfgApiKey" type="password" placeholder="sk-..." autocomplete="off" />
            <em class="field-hint" id="cfgKeyHint"></em>
          </label>

          <label class="field">
            <span data-i18n="model">Model</span>
            <input id="cfgModel" type="text" placeholder="gpt-4o-mini" autocomplete="off" />
          </label>

          <div class="settings-actions">
            <button class="btn ghost" id="testBtn" data-i18n="test">Test</button>
            <button class="btn" id="saveCfgBtn" data-i18n="save">Save</button>
          </div>

          <div class="test-result" id="testResult" hidden></div>
        </div>

        <div class="settings-section danger-section">
          <div class="settings-section-title"><span data-i18n="memoryTitle">Bartender memory</span></div>
          <p class="settings-hint" data-i18n="memoryHint"></p>
          <div class="memory-preview" id="memoryPreview"></div>
          <div class="settings-actions">
            <button class="btn danger" id="clearMemoryBtn" data-i18n="clearMemory">Clear memory</button>
          </div>
        </div>

        <div class="settings-section cellar-section">
          <div class="settings-section-title"><span data-i18n="cellarTitle">My cellar</span></div>
          <p class="settings-hint" data-i18n="cellarHint"></p>
          <div class="cellar-add">
            <input id="addIngredientName" type="text" data-i18n-ph="addIngredientPh" placeholder="Add ingredient…" autocomplete="off" />
            <select id="addIngredientCategory" aria-label="Ingredient category">
              <option value="liqueur" data-i18n="catLiqueur">Liqueur</option>
              <option value="base_spirit" data-i18n="catBaseSpirit">Base spirit</option>
              <option value="bitter_liqueur" data-i18n="catBitter">Bitter</option>
              <option value="fortified_wine" data-i18n="catFortified">Fortified</option>
              <option value="bitters" data-i18n="catBitters">Bitters</option>
              <option value="sweetener" data-i18n="catSweetener">Sweetener</option>
              <option value="citrus" data-i18n="catCitrus">Citrus</option>
              <option value="juice" data-i18n="catJuice">Juice</option>
              <option value="mixer" data-i18n="catMixer">Mixer</option>
              <option value="herb" data-i18n="catHerb">Herb</option>
              <option value="garnish" data-i18n="catGarnish">Garnish</option>
            </select>
            <button class="btn" id="addIngredientBtn" data-i18n="addIngredient">Add</button>
          </div>
          <input id="cellarSearch" type="search" class="cellar-search" data-i18n-ph="cellarSearchPh" placeholder="Search ingredients…" autocomplete="off" />
          <div class="cellar-list" id="cellarList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== RECIPE DETAIL SHEET ===================== -->
  <div class="sheet-overlay" id="sheetOverlay" hidden>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true">
      <button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>
      <div class="sheet-content" id="sheetContent"></div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <footer class="footer">
    <span id="lanInfo"></span>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
