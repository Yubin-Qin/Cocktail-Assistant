# Example cellar inventory — copy this file to inventory.yml and adjust to your bar.
#   cp data/cellar/inventory.example.yml data/cellar/inventory.yml
#
# inventory.yml is gitignored (it's your personal stock). This example is tracked
# so a fresh clone has a sensible default.
#
# ingredient_id must match an id in ingredients.yml.
# status: in_stock | low | missing | ignored
# note (optional): free text, e.g. a brand or style.
